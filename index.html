<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050b18">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NEXUS ONE">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./nexus-one-icon-soft-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./nexus-one-icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./nexus-one-icon-512.png">
  <title>NEXUS ONE</title>
  <style>
    :root {
      --bg-0: #030712;
      --bg-1: #061126;
      --bg-2: #0a1a35;
      --text: rgba(241, 247, 255, .96);
      --muted: rgba(188, 204, 229, .66);
      --faint: rgba(148, 187, 255, .22);
      --blue: #8ec5ff;
      --cyan: #67e8f9;
      --line: rgba(122, 190, 255, .74);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "Hiragino Sans",
        "Yu Gothic",
        "YuGothic",
        system-ui,
        sans-serif;
    }

    body {
      min-height: 100svh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 50% 34%, rgba(89, 150, 255, .28), transparent 31%),
        radial-gradient(circle at 50% 42%, rgba(103, 232, 249, .10), transparent 42%),
        radial-gradient(circle at 18% 18%, rgba(59, 130, 246, .13), transparent 30%),
        radial-gradient(circle at 82% 76%, rgba(14, 165, 233, .10), transparent 32%),
        linear-gradient(180deg, #07142d 0%, #050b18 54%, #030712 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 24% 22%, rgba(96, 165, 250, .16), transparent 30%),
        radial-gradient(circle at 74% 68%, rgba(14, 165, 233, .11), transparent 34%),
        radial-gradient(circle at 50% 45%, rgba(147, 197, 253, .10), transparent 48%);
      opacity: .95;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 26%, rgba(0,0,0,.18) 100%),
        radial-gradient(circle at 50% 47%, transparent 0 32%, rgba(1, 6, 16, .33) 72%, rgba(1, 6, 16, .58) 100%);
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(239, 248, 255, .95) 0%, rgba(147, 197, 253, .72) 34%, rgba(96, 165, 250, .08) 72%, transparent 100%);
      opacity: var(--o);
      filter: blur(var(--b));
      box-shadow:
        0 0 calc(var(--s) * 4.8) rgba(125, 211, 252, .58),
        0 0 calc(var(--s) * 9.2) rgba(59, 130, 246, .24);
      transform: translate3d(0,0,0) scale(var(--scale));
      animation:
        particleFloat var(--d) ease-in-out var(--delay) infinite alternate,
        particlePulse calc(var(--d) * .82) ease-in-out var(--delay) infinite alternate;
      will-change: transform, opacity;
    }

    .particle::after {
      content: "";
      position: absolute;
      inset: -240%;
      border-radius: inherit;
      background: radial-gradient(circle, rgba(186, 230, 253, .20), transparent 66%);
      filter: blur(5px);
    }

    @keyframes particleFloat {
      0% { transform: translate3d(0, 0, 0) scale(var(--scale)); }
      30% { transform: translate3d(calc(var(--dx) * .62), calc(var(--dy) * -.48), 0) scale(calc(var(--scale) * 1.08)); }
      68% { transform: translate3d(calc(var(--dx) * -.44), calc(var(--dy) * .74), 0) scale(calc(var(--scale) * .96)); }
      100% { transform: translate3d(var(--dx), var(--dy), 0) scale(calc(var(--scale) * 1.02)); }
    }

    @keyframes particlePulse {
      0%, 100% { opacity: calc(var(--o) * .52); }
      44% { opacity: var(--o); }
      72% { opacity: calc(var(--o) * .82); }
    }

    .entry {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        calc(28px + env(safe-area-inset-top))
        max(22px, env(safe-area-inset-right))
        calc(30px + env(safe-area-inset-bottom))
        max(22px, env(safe-area-inset-left));
    }


    .entry-inner {
      width: min(420px, 100%);
      display: grid;
      justify-items: center;
      transform: translateY(-2.5vh);
      animation: entryIn .72s cubic-bezier(.18,.92,.2,1) both;
    }

    .logo-stage {
      position: relative;
      width: min(78vw, 328px);
      aspect-ratio: 1.18 / 1;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
    }

    .logo-stage::before {
      content: "";
      position: absolute;
      inset: 2%;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(125, 211, 252, .16), rgba(37, 99, 235, .07) 38%, transparent 66%);
      filter: blur(10px);
      opacity: .42;
      animation: auraBreath 4.8s ease-in-out infinite;
    }

    .brand-logo {
      position: relative;
      z-index: 1;
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      filter:
        drop-shadow(0 18px 32px rgba(59, 130, 246, .14))
        drop-shadow(0 0 14px rgba(125, 211, 252, .10));
      animation: logoFocus 1.05s cubic-bezier(.18,.9,.2,1) both;
    }

    .brand-name {
      margin: 0;
      font-size: 17px;
      line-height: 1;
      letter-spacing: .34em;
      padding-left: .34em;
      font-weight: 560;
      color: rgba(239, 246, 255, .92);
      text-shadow: 0 0 22px rgba(147, 197, 253, .26);
    }

    .status {
      margin-top: 16px;
      min-height: 22px;
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: .08em;
      color: rgba(196, 216, 242, .72);
      text-align: center;
      transition: opacity .28s ease, transform .28s ease;
    }

    .status.is-switching {
      opacity: 0;
      transform: translateY(4px);
    }

    .status-dots {
      display: inline-flex;
      gap: 2px;
      margin-left: 1px;
      vertical-align: baseline;
    }

    .status-dots span {
      display: inline-block;
      animation: dotWave 1.05s ease-in-out infinite;
    }

    .status-dots span:nth-child(2) { animation-delay: .14s; }
    .status-dots span:nth-child(3) { animation-delay: .28s; }


    .light-line {
      position: relative;
      width: min(210px, 54vw);
      height: 1px;
      margin-top: 20px;
      overflow: hidden;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(148, 187, 255, .20), transparent);
    }

    .light-line::before {
      content: "";
      position: absolute;
      top: 0;
      left: -40%;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, rgba(186, 230, 253, .96), rgba(96, 165, 250, .76), transparent);
      box-shadow: 0 0 14px rgba(125, 211, 252, .78);
      animation: lightSweep 1.8s cubic-bezier(.4,0,.2,1) infinite;
    }

    .light-line::after {
      content: "";
      position: absolute;
      inset: -5px 18%;
      background: radial-gradient(ellipse, rgba(125, 211, 252, .20), transparent 68%);
      filter: blur(8px);
    }

    .actions {
      display: none;
      width: min(280px, 100%);
      gap: 10px;
      margin-top: 28px;
    }

    .actions.is-visible { display: grid; }

    .btn {
      appearance: none;
      border: 1px solid rgba(148, 187, 255, .20);
      border-radius: 18px;
      min-height: 48px;
      padding: 0 16px;
      background: rgba(15, 23, 42, .48);
      color: rgba(239, 246, 255, .88);
      font-weight: 650;
      font-size: 13px;
      letter-spacing: .02em;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 16px 36px rgba(0,0,0,.18);
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(37, 99, 235, .86), rgba(14, 165, 233, .72));
      color: #fff;
      border-color: rgba(186, 230, 253, .18);
      box-shadow: 0 18px 42px rgba(37, 99, 235, .26);
    }

    .footer-note {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 2;
      text-align: center;
      font-size: 9px;
      line-height: 1;
      letter-spacing: .32em;
      padding-left: .32em;
      color: rgba(148, 187, 255, .34);
    }

    .leave-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 44%, rgba(125, 211, 252, .16), transparent 36%),
        linear-gradient(180deg, rgba(5, 11, 24, .05), rgba(5, 11, 24, .68));
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      transition: opacity .48s ease, backdrop-filter .48s ease, -webkit-backdrop-filter .48s ease;
    }

    body.is-leaving .leave-layer {
      opacity: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    body.is-leaving .entry-inner {
      opacity: 0;
      transform: translateY(-10px) scale(1.025);
      filter: blur(12px);
      transition: opacity .48s ease, transform .48s cubic-bezier(.16,.92,.22,1), filter .48s ease;
    }

    @keyframes entryIn {
      from { opacity: 0; transform: translateY(10px) scale(.985); filter: blur(10px); }
      to { opacity: 1; transform: translateY(-2.5vh) scale(1); filter: blur(0); }
    }

    @keyframes logoFocus {
      0% { opacity: .24; transform: scale(.96); filter: blur(7px) drop-shadow(0 0 10px rgba(125,211,252,.08)); }
      64% { opacity: 1; transform: scale(1.015); filter: blur(0) drop-shadow(0 0 30px rgba(125,211,252,.20)); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes auraBreath {
      0%, 100% { transform: scale(.92); opacity: .48; }
      50% { transform: scale(1.08); opacity: .88; }
    }

    @keyframes lightSweep {
      0% { transform: translateX(0); opacity: .18; }
      20% { opacity: .95; }
      100% { transform: translateX(340%); opacity: .20; }
    }

    @keyframes dotWave {
      0%, 70%, 100% { opacity: .34; transform: translateY(0); }
      35% { opacity: 1; transform: translateY(-3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

  <script>
    const APP_VERSION = 'index_patch_v10_richer_drift_particles';
    const GAS_API_URL = localStorage.getItem('nexusGasApiUrl') || 'https://script.google.com/macros/s/AKfycbwiV9vLacv8se1UVdGhhKuoWkSlsNReRJOUIgT494XUMBNUKBOxMhkzXLsvHRdCfWIt/exec';
    const ENTRY_MIN_DURATION_MS = 1900;
    let entryStartedAt = Date.now();
    let statusLocked = false;

    const PAGES = {
      home: 'NEXUS_ONE_Home_v6_mobile_optimized.html',
      login: 'NEXUS_ONE_Login_Unified_v3_mobile_optimized.html',
      initialSetup: 'NEXUS_ONE_Initial_Setup_Unified_v3_mobile_optimized.html'
    };

    const STORAGE_KEYS = {
      employeeId: ['nexusEmployeeId', 'nexusCurrentEmployeeId', 'employeeId'],
      email: ['nexusUserEmail', 'nexusGoogleEmail', 'userEmail', 'email']
    };

    const $ = (id) => document.getElementById(id);
    const statusMain = $('statusMain');
    const actions = $('actions');
    const particles = $('particles');
    createAmbientParticles();


    window.setTimeout(() => {
      if (!statusLocked) setStatus('Connecting');
    }, 1150);

    $('retryBtn').addEventListener('click', () => {
      actions.classList.remove('is-visible');
      entryStartedAt = Date.now();
      statusLocked = false;
      setStatus('Preparing workspace');
      window.setTimeout(() => { if (!statusLocked) setStatus('Connecting'); }, 1150);
      boot();
    });

    $('loginBtn').addEventListener('click', () => redirectTo('login'));
    document.addEventListener('DOMContentLoaded', boot);

    function createAmbientParticles() {
      if (!particles) return;
      const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const count = reduced ? 36 : 96;
      const colors = [
        'rgba(239, 248, 255, .95)',
        'rgba(186, 230, 253, .86)',
        'rgba(147, 197, 253, .80)',
        'rgba(125, 211, 252, .74)'
      ];
      particles.innerHTML = '';
      for (let i = 0; i < count; i += 1) {
        const p = document.createElement('span');
        p.className = 'particle';
        const size = rand(1.4, 5.2);
        const opacity = rand(.38, .90);
        const dx = rand(-34, 34);
        const dy = rand(-42, 42);
        p.style.setProperty('--x', `${rand(4, 96).toFixed(2)}%`);
        p.style.setProperty('--y', `${rand(5, 95).toFixed(2)}%`);
        p.style.setProperty('--s', `${size.toFixed(2)}px`);
        p.style.setProperty('--o', opacity.toFixed(2));
        p.style.setProperty('--b', `${rand(.45, 2.2).toFixed(2)}px`);
        p.style.setProperty('--scale', rand(.82, 1.28).toFixed(2));
        p.style.setProperty('--dx', `${dx.toFixed(1)}px`);
        p.style.setProperty('--dy', `${dy.toFixed(1)}px`);
        p.style.setProperty('--d', `${rand(4.8, 10.5).toFixed(2)}s`);
        p.style.setProperty('--delay', `${rand(-10, 0).toFixed(2)}s`);
        p.style.background = `radial-gradient(circle, ${colors[i % colors.length]} 0%, rgba(147, 197, 253, .68) 30%, rgba(96, 165, 250, .18) 72%, transparent 100%)`;
        particles.appendChild(p);
      }
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function boot() {
      const params = new URLSearchParams(location.search);
      if (params.get('clear') === '1') clearSession();

      const employeeId = pickUrlParam(params, ['employeeId', 'eid']) || pickStorage(STORAGE_KEYS.employeeId);
      const email = pickUrlParam(params, ['email', 'userEmail', 'googleEmail']) || pickStorage(STORAGE_KEYS.email);

      if (!employeeId && !email) {
        runAfterEntryMinimum(() => {
          statusLocked = true;
          setStatus('Login required');
          redirectTo('login');
        }, 160);
        return;
      }

      checkUserStatus({ employeeId, email })
        .then((res) => {
          const data = res && res.data ? res.data : res;
          if (!res || res.ok === false) throw new Error((res && res.message) || 'ユーザー状態の確認に失敗しました');
          handleStatus(data || {});
        })
        .catch((err) => {
          console.error(err);
          statusLocked = true;
          setStatus('Could not verify');
          actions.classList.add('is-visible');
        });
    }

    function handleStatus(data) {
      const status = data.status;
      const employeeId = data.employeeId || '';

      if (status === 'approved' && employeeId) {
        saveSession(data);
        fetchAndCacheInitialData(employeeId)
          .catch((err) => console.warn('[NEXUS ONE] initial data preload failed:', err))
          .finally(() => {
            statusLocked = true;
            setStatus('Ready');
            runAfterEntryMinimum(() => redirectTo('home', { employeeId }), 110);
          });
        return;
      }

      if (status === 'pending') {
        saveSession(data);
        statusLocked = true;
        setStatus('Pending approval');
        runAfterEntryMinimum(() => redirectTo('initialSetup', compactParams({
          employeeId: employeeId,
          status: 'pending',
          email: data.email
        })), 260);
        return;
      }

      if (status === 'not_registered') {
        if (data.email) localStorage.setItem('nexusUserEmail', data.email);
        statusLocked = true;
        setStatus('Initial setup');
        runAfterEntryMinimum(() => redirectTo('initialSetup', compactParams({
          email: data.email,
          status: 'not_registered'
        })), 260);
        return;
      }

      clearSession();
      statusLocked = true;
      setStatus(status === 'inactive' ? 'Account inactive' : 'Login required');
      runAfterEntryMinimum(() => redirectTo('login'), 280);
    }

    function setStatus(text) {
      if (!statusMain) return;
      statusMain.classList.add('is-switching');
      window.setTimeout(() => {
        if (text === 'Connecting') {
          statusMain.innerHTML = 'Connecting<span class="status-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>';
        } else {
          statusMain.textContent = text || '';
        }
        statusMain.classList.remove('is-switching');
      }, 170);
    }

    function runAfterEntryMinimum(callback, extraDelay = 0) {
      const elapsed = Date.now() - entryStartedAt;
      const wait = Math.max(ENTRY_MIN_DURATION_MS - elapsed, 0) + extraDelay;
      window.setTimeout(callback, wait);
    }

    function cacheInitialData(data) {
      try {
        if (!data || typeof data !== 'object') return;
        data.cachedAt = Date.now();
        localStorage.setItem('nexusMobileInitialData', JSON.stringify(data));
        localStorage.setItem('nexusMobileInitialDataAt', String(data.cachedAt));
      } catch (e) {}
    }

    function fetchAndCacheInitialData(employeeId) {
      return jsonpRequest({
        action: 'getMobileInitialData',
        employeeId: employeeId || ''
      }).then((res) => {
        const data = res && res.data ? res.data : res;
        if (res && res.ok === false) throw new Error(res.message || '初回データの取得に失敗しました');
        if (data) cacheInitialData(data);
        return data;
      });
    }

    function checkUserStatus(payload) {
      return jsonpRequest({
        action: 'checkUserStatus',
        employeeId: payload.employeeId || '',
        email: payload.email || ''
      });
    }

    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        if (!GAS_API_URL || GAS_API_URL.includes('PASTE_GAS_WEB_APP_URL_HERE')) {
          reject(new Error('GAS URLが未設定です'));
          return;
        }

        const callbackName = `nexusEntryCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        const timer = window.setTimeout(() => {
          cleanup();
          reject(new Error('GASとの通信がタイムアウトしました'));
        }, 30000);

        window[callbackName] = (response) => { cleanup(); resolve(response); };

        function cleanup() {
          window.clearTimeout(timer);
          delete window[callbackName];
          if (script && script.parentNode) script.parentNode.removeChild(script);
        }

        const url = new URL(GAS_API_URL);
        Object.entries(params).forEach(([key, value]) => {
          if (value !== undefined && value !== null && String(value) !== '') url.searchParams.set(key, value);
        });
        url.searchParams.set('callback', callbackName);
        url.searchParams.set('_', Date.now());

        script.onerror = () => { cleanup(); reject(new Error('GASに接続できませんでした')); };
        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function saveSession(data) {
      if (data.employeeId) {
        localStorage.setItem('nexusEmployeeId', data.employeeId);
        localStorage.setItem('nexusCurrentEmployeeId', data.employeeId);
        sessionStorage.setItem('nexusEmployeeId', data.employeeId);
      }
      if (data.email) {
        localStorage.setItem('nexusUserEmail', data.email);
        sessionStorage.setItem('nexusUserEmail', data.email);
      }
      if (data.name) localStorage.setItem('nexusEmployeeName', data.name);
    }

    function clearSession() {
      ['nexusEmployeeId','nexusCurrentEmployeeId','employeeId','nexusUserEmail','nexusGoogleEmail','userEmail','email']
        .forEach((key) => { localStorage.removeItem(key); sessionStorage.removeItem(key); });
    }

    function pickUrlParam(params, keys) {
      for (const key of keys) {
        const value = params.get(key);
        if (value && String(value).trim()) return String(value).trim();
      }
      return '';
    }

    function pickStorage(keys) {
      for (const key of keys) {
        const s = sessionStorage.getItem(key);
        if (s && String(s).trim()) return String(s).trim();
      }
      for (const key of keys) {
        const l = localStorage.getItem(key);
        if (l && String(l).trim()) return String(l).trim();
      }
      return '';
    }

    function redirectTo(pageKey, params = {}) {
      if (pageKey === 'home') {
        try { sessionStorage.setItem('nexusHomeIntro', '1'); } catch (e) {}
      }
      const base = PAGES[pageKey] || PAGES.login;
      const query = new URLSearchParams();
      Object.entries(params || {}).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value) !== '') query.set(key, value);
      });
      const target = query.toString() ? `${base}?${query.toString()}` : base;

      if (document.body.classList.contains('is-leaving')) return;
      document.body.classList.add('is-leaving');
      window.setTimeout(() => { location.href = target; }, 480);
    }

    function compactParams(params) {
      const out = {};
      Object.entries(params || {}).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value) !== '') out[key] = value;
      });
      return out;
    }
  </script>
</body>
