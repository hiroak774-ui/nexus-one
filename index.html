<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- NEXUS ONE PWA / Home Screen Settings -->
  <meta name="theme-color" content="#07152c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NEXUS ONE">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./nexus-one-icon-soft-180.png">

  <title>NEXUS ONE | App Entry</title>
<style>
    :root {
      --bg: #f5f8ff;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --border: rgba(203, 213, 225, 0.62);
      --text: #111827;
      --muted: #64748b;
      --soft: #94a3b8;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --shadow:
        0 30px 80px rgba(15, 23, 42, 0.10),
        0 12px 32px rgba(37, 99, 235, 0.10);
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "Hiragino Sans",
        "Yu Gothic",
        "YuGothic",
        system-ui,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(96, 165, 250, 0.22), transparent 34%),
        radial-gradient(circle at 20% 78%, rgba(37, 99, 235, 0.10), transparent 32%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.92) 0 1px, transparent 1px 100%);
      background-size: 34px 34px;
      opacity: .28;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 46%, rgba(255,255,255,.94), rgba(226,242,255,.72) 42%, rgba(248,251,255,.28) 68%, transparent 100%);
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      transition:
        opacity .46s ease,
        backdrop-filter .46s ease,
        -webkit-backdrop-filter .46s ease;
    }

    body.is-leaving::after {
      opacity: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .page {
      position: relative;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .entry-card {
      width: min(420px, 100%);
      min-height: 410px;
      position: relative;
      padding: 42px 28px 28px;
      border: 1px solid rgba(203, 213, 225, 0.42);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.48)),
        var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: cardIn .7s cubic-bezier(.2,.9,.2,1) both;
    }

    body.is-leaving .entry-card {
      opacity: 0;
      transform: translateY(-8px) scale(1.025);
      filter: blur(10px);
      transition:
        opacity .46s ease,
        transform .46s cubic-bezier(.16,.92,.22,1),
        filter .46s ease;
    }

    body.is-leaving .brand-logo-img {
      transform: scale(.98);
      transition: transform .46s cubic-bezier(.16,.92,.22,1);
    }

    .entry-card::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      left: 50%;
      top: 33%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(125,211,252,.18), rgba(37,99,235,.06) 46%, transparent 70%);
      filter: blur(10px);
      opacity: .82;
      pointer-events: none;
      animation: aura 6.2s ease-in-out infinite;
    }

    .brand {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      gap: 18px;
      margin-bottom: 42px;
    }

    .brand-logo-wrap {
      position: relative;
      width: 156px;
      height: 156px;
      display: grid;
      place-items: center;
      overflow: visible;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .brand-logo-wrap::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(125,211,252,.18), transparent 68%);
      filter: blur(14px);
      opacity: .62;
      animation: logoAura 5.8s ease-in-out infinite;
      pointer-events: none;
    }

    .brand-logo-img {
      position: relative;
      z-index: 1;
      width: 132px;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 20px 34px rgba(37,99,235,.16));
      animation: logoFocus 1.35s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes logoFocus {
      0% { opacity: 0; filter: blur(12px) drop-shadow(0 18px 26px rgba(37,99,235,.08)); transform: scale(.94); }
      100% { opacity: 1; filter: blur(0) drop-shadow(0 20px 34px rgba(37,99,235,.16)); transform: scale(1); }
    }

    @keyframes logoAura {
      0%, 100% { transform: scale(.92); opacity: .38; }
      50% { transform: scale(1.12); opacity: .68; }
    }

    .status-area {
      position: relative;
      z-index: 1;
      text-align: center;
      min-height: 92px;
    }

    .status-main {
      font-size: 16px;
      line-height: 1.6;
      letter-spacing: .03em;
      font-weight: 650;
      color: #1f2937;
      margin: 0 0 8px;
    }

    .status-sub {
      min-height: 20px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0;
    }

    .checking {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .dots {
      display: inline-flex;
      gap: 5px;
      transform: translateY(1px);
    }

    .dots i {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(37,99,235,.5);
      animation: dot 1.2s ease-in-out infinite;
    }

    .dots i:nth-child(2) { animation-delay: .16s; }
    .dots i:nth-child(3) { animation-delay: .32s; }

    .entry-progress {
      position: relative;
      z-index: 1;
      width: 118px;
      height: 2px;
      margin: 18px auto 0;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, .18);
    }

    .entry-progress span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, rgba(37, 99, 235, .50), transparent);
      animation: entryProgress 1.8s ease-in-out infinite;
    }

    .actions {
      position: relative;
      z-index: 1;
      display: none;
      gap: 10px;
      margin-top: 22px;
      width: 100%;
    }

    .actions.is-visible {
      display: grid;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(203,213,225,.7);
      border-radius: 18px;
      min-height: 48px;
      padding: 0 16px;
      background: rgba(255,255,255,.76);
      color: #334155;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .02em;
      box-shadow: 0 12px 24px rgba(15,23,42,.06);
      cursor: pointer;
    }

    .btn.primary {
      background: rgba(37,99,235,.92);
      color: #fff;
      border-color: rgba(37,99,235,.22);
      box-shadow: 0 16px 28px rgba(37,99,235,.18);
    }

    .footer-note {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 22px;
      text-align: center;
      font-size: 10px;
      letter-spacing: .18em;
      color: rgba(100,116,139,.62);
      padding-left: .18em;
      z-index: 1;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.985);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes aura {
      0%, 100% { transform: translate(-50%, -50%) scale(.94); opacity: .62; }
      50% { transform: translate(-50%, -50%) scale(1.04); opacity: .95; }
    }

    @keyframes dot {
      0%, 70%, 100% { transform: translateY(0); opacity: .32; }
      35% { transform: translateY(-4px); opacity: .82; }
    }

    @keyframes entryProgress {
      0% { transform: translateX(-120%); opacity: .22; }
      35% { opacity: .56; }
      100% { transform: translateX(250%); opacity: .22; }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #070b16;
        --surface: rgba(15, 23, 42, .70);
        --surface-strong: rgba(15, 23, 42, .92);
        --border: rgba(148, 163, 184, .18);
        --text: #f8fafc;
        --muted: #94a3b8;
        --soft: #64748b;
        --accent-soft: rgba(96,165,250,.14);
        --shadow:
          0 30px 80px rgba(0, 0, 0, 0.34),
          0 12px 32px rgba(37, 99, 235, 0.10);
      }

      html, body {
        background:
          radial-gradient(circle at 50% 18%, rgba(37, 99, 235, 0.25), transparent 36%),
          radial-gradient(circle at 20% 78%, rgba(14, 165, 233, 0.11), transparent 32%),
          linear-gradient(180deg, #0f172a 0%, var(--bg) 100%);
      }

      .entry-card {
        background:
          linear-gradient(180deg, rgba(15,23,42,.86), rgba(15,23,42,.60)),
          var(--surface);
      }

      .status-main {
        color: #f8fafc;
      }

      .mark {
        background:
          linear-gradient(135deg, rgba(30,41,59,.96), rgba(15,23,42,.76)),
          linear-gradient(135deg, rgba(96,165,250,.22), rgba(14,165,233,.08));
        border-color: rgba(148,163,184,.20);
      }

      .mark span {
        color: #93c5fd;
      }

      .btn {
        background: rgba(15,23,42,.74);
        color: #dbeafe;
        border-color: rgba(148,163,184,.22);
      }
    }

/* =========================================================
   NEXUS ONE production mobile viewport fix
   - Removes desktop phone mock frame on real smartphones
   - Uses dynamic viewport height for Safari / LINE in-app browser
   ========================================================= */
@media (max-width: 640px), (hover: none) and (pointer: coarse) {
  html,
  body {
    width: 100%;
    min-height: 100%;
  }

  body {
    display: block !important;
    place-items: unset !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: hidden !important;
  }

  .phone {
    width: 100vw !important;
    max-width: none !important;
    height: 100svh !important;
    height: 100dvh !important;
    min-height: 0 !important;
    max-height: none !important;
    border-radius: 0 !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  .app {
    height: 100% !important;
    min-height: 100% !important;
    padding-top: calc(16px + env(safe-area-inset-top)) !important;
    padding-right: max(16px, env(safe-area-inset-right)) !important;
    padding-bottom: calc(14px + env(safe-area-inset-bottom)) !important;
    padding-left: max(16px, env(safe-area-inset-left)) !important;
  }

  .header {
    margin-bottom: 14px !important;
  }

  .content,
  .screen-content,
  .page-content,
  .scroll-area {
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(104px + env(safe-area-inset-bottom)) !important;
  }

  .tabbar,
  .bottom-nav,
  .nav-bar {
    left: max(14px, env(safe-area-inset-left)) !important;
    right: max(14px, env(safe-area-inset-right)) !important;
    bottom: calc(12px + env(safe-area-inset-bottom)) !important;
    width: auto !important;
    height: 68px !important;
    border-radius: 26px !important;
  }

  .sheet,
  .notify,
  .bottom-sheet,
  .modal-sheet {
    left: max(12px, env(safe-area-inset-left)) !important;
    right: max(12px, env(safe-area-inset-right)) !important;
    bottom: calc(12px + env(safe-area-inset-bottom)) !important;
    max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }
}

@media (max-width: 640px) and (max-height: 760px) {
  .header { margin-bottom: 10px !important; }
  .user { margin-top: 2px !important; }
  .date { margin-top: 6px !important; }
  .clock-wrap { margin-top: 14px !important; }
  .hm { font-size: clamp(58px, 18vw, 76px) !important; }
  .sec { font-size: clamp(18px, 5vw, 24px) !important; }
  .assist { margin-top: 10px !important; }
  .panel { margin-top: 16px !important; padding: 14px !important; }
  .punch-btn { height: 76px !important; }
  .quick { margin-top: 12px !important; }
  .stat { padding: 12px !important; }
}

</style>
</head>

      <div class="status-area">
        <p class="status-main" id="statusMain">
          <span class="checking">Checking<span class="dots"><i></i><i></i><i></i></span></span>
        </p>
        <p class="status-sub" id="statusSub">Secure session check</p>
      </div>

      <div class="entry-progress" aria-hidden="true"><span></span></div>

      <div class="actions" id="actions">
        <button class="btn primary" type="button" id="retryBtn">再確認する</button>
        <button class="btn" type="button" id="loginBtn">ログインへ</button>
      </div>

      <div class="footer-note">APP ENTRY</div>
    </section>
  </main>

  <script>
    const APP_VERSION = 'index_ready_v3';
    const GAS_API_URL = localStorage.getItem('nexusGasApiUrl') || 'https://script.google.com/macros/s/AKfycbwiV9vLacv8se1UVdGhhKuoWkSlsNReRJOUIgT494XUMBNUKBOxMhkzXLsvHRdCfWIt/exec';
    const ENTRY_MIN_DURATION_MS = 1400;
    let entryStartedAt = Date.now();

    const PAGES = {
      home: 'NEXUS_ONE_Home_v6_mobile_optimized.html',
      login: 'NEXUS_ONE_Login_Unified_v3_mobile_optimized.html',
      initialSetup: 'NEXUS_ONE_Initial_Setup_Unified_v3_mobile_optimized.html'
    };

    const STORAGE_KEYS = {
      employeeId: [
        'nexusEmployeeId',
        'nexusCurrentEmployeeId',
        'employeeId'
      ],
      email: [
        'nexusUserEmail',
        'nexusGoogleEmail',
        'userEmail',
        'email'
      ]
    };

    const $ = (id) => document.getElementById(id);
    const statusMain = $('statusMain');
    const statusSub = $('statusSub');
    const actions = $('actions');

    $('retryBtn').addEventListener('click', () => {
      actions.classList.remove('is-visible');
      entryStartedAt = Date.now();
      setChecking('Checking', 'Secure session check');
      boot();
    });

    $('loginBtn').addEventListener('click', () => redirectTo('login'));

    document.addEventListener('DOMContentLoaded', boot);

    function boot() {
      const params = new URLSearchParams(location.search);

      if (params.get('clear') === '1') {
        clearSession();
      }

      const employeeId =
        pickUrlParam(params, ['employeeId', 'eid']) ||
        pickStorage(STORAGE_KEYS.employeeId);

      const email =
        pickUrlParam(params, ['email', 'userEmail', 'googleEmail']) ||
        pickStorage(STORAGE_KEYS.email);

      if (!employeeId && !email) {
        runAfterEntryMinimum(() => {
          setStatus('Login Required', 'ログイン情報が見つかりません');
          redirectTo('login');
        }, 180);
        return;
      }

      checkUserStatus({ employeeId, email })
        .then((res) => {
          const data = res && res.data ? res.data : res;

          if (!res || res.ok === false) {
            throw new Error((res && res.message) || 'ユーザー状態の確認に失敗しました');
          }

          handleStatus(data || {});
        })
        .catch((err) => {
          console.error(err);
          setStatus('Could Not Verify', err.message || '接続エラーが発生しました');
          actions.classList.add('is-visible');
        });
    }

    function handleStatus(data) {
      const status = data.status;
      const employeeId = data.employeeId || '';

      if (status === 'approved' && employeeId) {
        saveSession(data);
        setStatus('Loading Data', '初回データを取得しています');
        fetchAndCacheInitialData(employeeId)
          .catch((err) => {
            console.warn('[NEXUS ONE] initial data preload failed:', err);
          })
          .finally(() => {
            setStatus('Ready', 'Opening Home');
            runAfterEntryMinimum(() => redirectTo('home', { employeeId }), 120);
          });
        return;
      }

      if (status === 'pending') {
        saveSession(data);
        setStatus('Pending Approval', '管理者の承認待ちです');
        runAfterEntryMinimum(() => redirectTo('initialSetup', compactParams({
          employeeId: employeeId,
          status: 'pending',
          email: data.email
        })), 280);
        return;
      }

      if (status === 'not_registered') {
        if (data.email) localStorage.setItem('nexusUserEmail', data.email);
        setStatus('Initial Setup', '初期登録が必要です');
        runAfterEntryMinimum(() => redirectTo('initialSetup', compactParams({
          email: data.email,
          status: 'not_registered'
        })), 280);
        return;
      }

      clearSession();

      if (status === 'inactive') {
        setStatus('Account Inactive', 'アカウントが有効ではないためログイン画面へ移動します');
      } else {
        setStatus('Login Required', 'ログイン画面へ移動します');
      }

      runAfterEntryMinimum(() => redirectTo('login'), 300);
    }

    function runAfterEntryMinimum(callback, extraDelay = 0) {
      const elapsed = Date.now() - entryStartedAt;
      const wait = Math.max(ENTRY_MIN_DURATION_MS - elapsed, 0) + extraDelay;
      window.setTimeout(callback, wait);
    }


    function cacheInitialData(data) {
      try {
        if (!data || typeof data !== 'object') return;
        data.cachedAt = Date.now();
        localStorage.setItem('nexusMobileInitialData', JSON.stringify(data));
        localStorage.setItem('nexusMobileInitialDataAt', String(data.cachedAt));
      } catch (e) {}
    }

    function fetchAndCacheInitialData(employeeId) {
      return jsonpRequest({
        action: 'getMobileInitialData',
        employeeId: employeeId || ''
      }).then((res) => {
        const data = res && res.data ? res.data : res;
        if (res && res.ok === false) throw new Error(res.message || '初回データの取得に失敗しました');
        if (data) cacheInitialData(data);
        return data;
      });
    }

    function checkUserStatus(payload) {
      return jsonpRequest({
        action: 'checkUserStatus',
        employeeId: payload.employeeId || '',
        email: payload.email || ''
      });
    }

    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        if (!GAS_API_URL || GAS_API_URL.includes('PASTE_GAS_WEB_APP_URL_HERE')) {
          reject(new Error('GAS URLが未設定です'));
          return;
        }

        const callbackName = `nexusEntryCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        const timer = window.setTimeout(() => {
          cleanup();
          reject(new Error('GASとの通信がタイムアウトしました'));
        }, 30000);

        window[callbackName] = (response) => {
          cleanup();
          resolve(response);
        };

        function cleanup() {
          window.clearTimeout(timer);
          delete window[callbackName];
          if (script && script.parentNode) script.parentNode.removeChild(script);
        }

        const url = new URL(GAS_API_URL);
        Object.entries(params).forEach(([key, value]) => {
          if (value !== undefined && value !== null && String(value) !== '') {
            url.searchParams.set(key, value);
          }
        });
        url.searchParams.set('callback', callbackName);
        url.searchParams.set('_', Date.now());

        script.onerror = () => {
          cleanup();
          reject(new Error('GASに接続できませんでした'));
        };

        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function saveSession(data) {
      if (data.employeeId) {
        localStorage.setItem('nexusEmployeeId', data.employeeId);
        localStorage.setItem('nexusCurrentEmployeeId', data.employeeId);
        sessionStorage.setItem('nexusEmployeeId', data.employeeId);
      }
      if (data.email) {
        localStorage.setItem('nexusUserEmail', data.email);
        sessionStorage.setItem('nexusUserEmail', data.email);
      }
      if (data.name) {
        localStorage.setItem('nexusEmployeeName', data.name);
      }
    }

    function clearSession() {
      [
        'nexusEmployeeId',
        'nexusCurrentEmployeeId',
        'employeeId',
        'nexusUserEmail',
        'nexusGoogleEmail',
        'userEmail',
        'email'
      ].forEach((key) => {
        localStorage.removeItem(key);
        sessionStorage.removeItem(key);
      });
    }

    function pickUrlParam(params, keys) {
      for (const key of keys) {
        const value = params.get(key);
        if (value && String(value).trim()) return String(value).trim();
      }
      return '';
    }

    function pickStorage(keys) {
      for (const key of keys) {
        const s = sessionStorage.getItem(key);
        if (s && String(s).trim()) return String(s).trim();
      }
      for (const key of keys) {
        const l = localStorage.getItem(key);
        if (l && String(l).trim()) return String(l).trim();
      }
      return '';
    }

    function setChecking(main, sub) {
      statusMain.innerHTML = `<span class="checking">${escapeHtml(main)}<span class="dots"><i></i><i></i><i></i></span></span>`;
      statusSub.textContent = sub || '';
    }

    function setStatus(main, sub) {
      statusMain.textContent = main;
      statusSub.textContent = sub || '';
    }

    function redirectTo(pageKey, params = {}) {
      const base = PAGES[pageKey] || PAGES.login;
      const query = new URLSearchParams();
      Object.entries(params || {}).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value) !== '') {
          query.set(key, value);
        }
      });
      const target = query.toString() ? `${base}?${query.toString()}` : base;

      if (document.body.classList.contains('is-leaving')) return;
      document.body.classList.add('is-leaving');
      window.setTimeout(() => {
        location.href = target;
      }, 460);
    }

    function compactParams(params) {
      const out = {};
      Object.entries(params || {}).forEach(([key, value]) => {
        if (value !== undefined && value !== null && String(value) !== '') {
          out[key] = value;
        }
      });
      return out;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
