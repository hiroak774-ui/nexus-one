/* =========================================================
   NEXUS ONE production mobile viewport fix
   - Removes desktop phone mock frame on real smartphones
   - Uses dynamic viewport height for Safari / LINE in-app browser
   ========================================================= */
@media (max-width: 640px), (hover: none) and (pointer: coarse) {
  html,
  body {
    width: 100%;
    min-height: 100%;
  }

  body {
    display: block !important;
    place-items: unset !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: hidden !important;
  }

  .phone {
    width: 100vw !important;
    max-width: none !important;
    height: 100svh !important;
    height: 100dvh !important;
    min-height: 0 !important;
    max-height: none !important;
    border-radius: 0 !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  .app {
    height: 100% !important;
    min-height: 100% !important;
    padding-top: calc(16px + env(safe-area-inset-top)) !important;
    padding-right: max(16px, env(safe-area-inset-right)) !important;
    padding-bottom: calc(14px + env(safe-area-inset-bottom)) !important;
    padding-left: max(16px, env(safe-area-inset-left)) !important;
  }

  .header {
    margin-bottom: 14px !important;
  }

  .content,
  .screen-content,
  .page-content,
  .scroll-area {
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(104px + env(safe-area-inset-bottom)) !important;
  }

  .tabbar,
  .bottom-nav,
  .nav-bar {
    left: max(14px, env(safe-area-inset-left)) !important;
    right: max(14px, env(safe-area-inset-right)) !important;
    bottom: calc(12px + env(safe-area-inset-bottom)) !important;
    width: auto !important;
    height: 68px !important;
    border-radius: 26px !important;
  }

  .sheet,
  .notify,
  .bottom-sheet,
  .modal-sheet {
    left: max(12px, env(safe-area-inset-left)) !important;
    right: max(12px, env(safe-area-inset-right)) !important;
    bottom: calc(12px + env(safe-area-inset-bottom)) !important;
    max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }
}

@media (max-width: 640px) and (max-height: 760px) {
  .header { margin-bottom: 10px !important; }
  .user { margin-top: 2px !important; }
  .date { margin-top: 6px !important; }
  .clock-wrap { margin-top: 14px !important; }
  .hm { font-size: clamp(58px, 18vw, 76px) !important; }
  .sec { font-size: clamp(18px, 5vw, 24px) !important; }
  .assist { margin-top: 10px !important; }
  .panel { margin-top: 16px !important; padding: 14px !important; }
  .punch-btn { height: 76px !important; }
  .quick { margin-top: 12px !important; }
  .stat { padding: 12px !important; }
}

function setupParticles(canvas,count,logo=false){const ctx=canvas.getContext('2d');let particles=[];function resize(){const rect=canvas.getBoundingClientRect();const dpr=window.devicePixelRatio||1;canvas.width=Math.floor(rect.width*dpr);canvas.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);particles=Array.from({length:count},(_,i)=>logo?({angle:(Math.PI*2/count)*i+Math.random()*.28,radius:28+Math.random()*26,speed:(Math.random()*.0025+.0012)*(Math.random()>.5?1:-1),size:Math.random()*1.45+.65,alpha:Math.random()*.46+.24,pulse:Math.random()*Math.PI*2}):({x:Math.random()*rect.width,y:Math.random()*rect.height,r:Math.random()*1.75+.45,vx:(Math.random()-.5)*.045,vy:(Math.random()-.5)*.045,a:Math.random()*.40+.16,p:Math.random()*Math.PI*2}));}function draw(){const rect=canvas.getBoundingClientRect();ctx.clearRect(0,0,rect.width,rect.height);const isLight=document.body.classList.contains('light');particles.forEach(pt=>{if(logo){pt.angle+=pt.speed;pt.pulse+=.018;const cx=rect.width/2,cy=rect.height/2;const x=cx+Math.cos(pt.angle)*pt.radius;const y=cy+Math.sin(pt.angle)*(pt.radius*.44);const alpha=Math.max(.10,pt.alpha+Math.sin(pt.pulse)*.12);ctx.beginPath();ctx.fillStyle=`rgba(125,211,252,${alpha})`;ctx.shadowBlur=14;ctx.shadowColor='rgba(56,189,248,.88)';ctx.arc(x,y,pt.size,0,Math.PI*2);ctx.fill();}else{pt.x+=pt.vx;pt.y+=pt.vy;pt.p+=.007;if(pt.x<-8)pt.x=rect.width+8;if(pt.x>rect.width+8)pt.x=-8;if(pt.y<-8)pt.y=rect.height+8;if(pt.y>rect.height+8)pt.y=-8;const alpha=Math.max(.04,pt.a+Math.sin(pt.p)*.08);ctx.beginPath();ctx.fillStyle=isLight?`rgba(255,255,255,${Math.max(.10,alpha+.12)})`:`rgba(125,211,252,${alpha})`;ctx.shadowBlur=isLight?26:22;ctx.shadowColor=isLight?'rgba(56,189,248,.62)':'rgba(56,189,248,.58)';ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();}});requestAnimationFrame(draw);}resize();draw();window.addEventListener('resize',resize);}
setupParticles(document.getElementById('ambientCanvas'),92);setupParticles(document.getElementById('logoParticleCanvas'),24,true);

const themeBtn=document.getElementById('themeBtn'),themeIcon=document.getElementById('themeIcon');function syncThemeIcon(){themeIcon.innerHTML=document.body.classList.contains('light')?'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>':'<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';}syncThemeIcon();themeBtn.onclick=()=>{document.body.classList.toggle('light');localStorage.setItem('nexusTheme',document.body.classList.contains('light')?'light':'dark');syncThemeIcon();};

const GAS_API_URL=localStorage.getItem('nexusGasApiUrl') || 'https://script.google.com/macros/s/AKfycbwiV9vLacv8se1UVdGhhKuoWkSlsNReRJOUIgT494XUMBNUKBOxMhkzXLsvHRdCfWIt/exec';

const NEXUS_INITIAL_CACHE_KEY = 'nexusMobileInitialData';
const NEXUS_INITIAL_CACHE_AT_KEY = 'nexusMobileInitialDataAt';
const NEXUS_INITIAL_CACHE_TTL = 5 * 60 * 1000;
function readInitialCache(){
  try{
    const raw = localStorage.getItem(NEXUS_INITIAL_CACHE_KEY);
    if(!raw) return null;
    const cache = JSON.parse(raw);
    if(!cache || typeof cache !== 'object') return null;
    const at = Number(localStorage.getItem(NEXUS_INITIAL_CACHE_AT_KEY) || cache.cachedAt || 0);
    cache.cachedAt = at;
    return cache;
  }catch(e){ return null; }
}
function writeInitialCache(cache){
  try{
    if(!cache || typeof cache !== 'object') return;
    const now = Date.now();
    cache.cachedAt = now;
    localStorage.setItem(NEXUS_INITIAL_CACHE_KEY, JSON.stringify(cache));
    localStorage.setItem(NEXUS_INITIAL_CACHE_AT_KEY, String(now));
  }catch(e){}
}
function isInitialCacheFresh(cache, employeeId){
  if(!cache) return false;
  if(employeeId && cache.employeeId && String(cache.employeeId) !== String(employeeId)) return false;
  const at = Number(cache.cachedAt || 0);
  return at && Date.now() - at <= NEXUS_INITIAL_CACHE_TTL;
}
function mergeInitialCache(partial){
  const current = readInitialCache() || {};
  const next = Object.assign({}, current, partial || {});
  writeInitialCache(next);
  return next;
}

function resolveEmployeeId(){const qp=new URLSearchParams(location.search);for(const k of ['employeeId','eid']){const v=qp.get(k);if(v){const id=v.trim();sessionStorage.setItem('nexusEmployeeId',id);localStorage.setItem('nexusEmployeeId',id);return id;}}const keys=['nexusEmployeeId','nexusCurrentEmployeeId','employeeId'];for(const k of keys){const v=sessionStorage.getItem(k);if(v)return v.trim();}for(const k of keys){const v=localStorage.getItem(k);if(v)return v.trim();}return '';}
const CURRENT_EMPLOYEE_ID=resolveEmployeeId();
function apiRequest(action,payload={}){return new Promise((resolve,reject)=>{const cb='nexusAttCb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const script=document.createElement('script');const params=new URLSearchParams({action,callback:cb,employeeId:CURRENT_EMPLOYEE_ID,...payload});const timer=setTimeout(()=>{cleanup();reject(new Error('GASの応答がタイムアウトしました。'));},18000);function cleanup(){clearTimeout(timer);delete window[cb];script.remove();}window[cb]=(res)=>{cleanup();if(res&&res.ok)resolve(res.data);else reject(new Error(res?.message||'通信に失敗しました。'));};script.onerror=()=>{cleanup();reject(new Error('GASに接続できませんでした。'));};script.src=GAS_API_URL+'?'+params.toString();document.body.appendChild(script);});}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function displayDate(date){if(!date)return '-';const p=String(date).split('-');return `${Number(p[1])}/${Number(p[2])}`;}
function monthLabel(y,m){return `${y}<span class="dot">.</span>${String(m).padStart(2,'0')}`;}
const now=new Date();let selectedYear=Number(new URLSearchParams(location.search).get('year'))||now.getFullYear();let selectedMonth=Number(new URLSearchParams(location.search).get('month'))||now.getMonth()+1;let attendanceData=null;
const sheet=document.getElementById('sheet'),sheetBackdrop=document.getElementById('sheetBackdrop'),sheetTitle=document.getElementById('sheetTitle'),sheetBody=document.getElementById('sheetBody');
function openSheet(title,html){sheetTitle.textContent=title;sheetBody.classList.remove('flow-in');sheetBody.innerHTML=html;sheetBackdrop.classList.add('show');sheet.classList.add('show');void sheetBody.offsetWidth;sheetBody.classList.add('flow-in');}
function closeSheet(){sheet.classList.remove('show');sheetBackdrop.classList.remove('show');}sheetBackdrop.onclick=closeSheet;document.getElementById('closeSheet').onclick=closeSheet;
function statusIcon(r){if(r.status==='attention')return '<span class="status warn">申請</span>';if(r.status==='blank')return '<span class="status blank">—</span>';return '<span class="status" aria-label="チェック済み"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>';}
function renderList(data){document.getElementById('monthValue').innerHTML=monthLabel(data.year,data.month);document.getElementById('sumDays').textContent=data.summary.attendanceDays;document.getElementById('sumHours').textContent=data.summary.totalWorkText;document.getElementById('sumIssues').textContent=data.summary.attentionCount;const alert=document.getElementById('alertCard');if(data.firstIssue){alert.classList.add('show');document.getElementById('alertText').textContent=`${displayDate(data.firstIssue.date)} ${data.firstIssue.issueText}`;}else{alert.classList.remove('show');}
  const list=document.getElementById('attendanceList');if(!data.records.length){list.innerHTML='<div class="empty-state">この月の勤怠データはありません。</div>';return;}
  list.innerHTML=data.records.map(r=>`<button class="att-row ${r.status==='attention'?'focusable':''}" data-date="${escapeHtml(r.date)}">
    <div class="att-date"><div class="att-date-main">${displayDate(r.date)}</div><div class="att-date-sub ${r.isSaturday?'sat':r.isSunday?'sun':''}">${r.weekday}</div></div>
    <div class="att-time"><div class="att-time-line"><div class="att-time-label">IN</div><div class="att-time-value ${r.clockIn?'':'empty'}">${r.clockIn||'--:--'}</div></div><div class="att-time-line"><div class="att-time-label">OUT</div><div class="att-time-value ${r.clockOut?'':'empty'}">${r.clockOut||'--:--'}</div></div></div>
    <div class="att-work ${r.workMinutes?'':'empty'}">${r.workMinutes||'--'}</div><div class="att-status">${statusIcon(r)}</div>
  </button>`).join('');
  list.querySelectorAll('.att-row').forEach(btn=>btn.onclick=()=>showDetail(btn.dataset.date));}
function getCachedAttendanceData(){const cache=readInitialCache();if(!isInitialCacheFresh(cache,CURRENT_EMPLOYEE_ID))return null;if(Number(cache.year)!==Number(selectedYear)||Number(cache.month)!==Number(selectedMonth))return null;return cache.attendance||null;}
async function loadAttendanceData({force=false}={}){const listEl=document.getElementById('attendanceList');if(!force){const cached=getCachedAttendanceData();if(cached){attendanceData=cached;renderList(attendanceData);return;}}listEl.innerHTML='<div class="loading">勤怠データを読み込んでいます</div>';try{attendanceData=await apiRequest('getAttendanceData',{year:selectedYear,month:selectedMonth});if(Number(new Date().getFullYear())===Number(selectedYear)&&Number(new Date().getMonth()+1)===Number(selectedMonth)){mergeInitialCache({employeeId:CURRENT_EMPLOYEE_ID,year:selectedYear,month:selectedMonth,attendance:attendanceData});}renderList(attendanceData);}catch(err){const cached=getCachedAttendanceData();if(cached){attendanceData=cached;renderList(attendanceData);return;}listEl.innerHTML=`<div class="empty-state">${escapeHtml(err.message||err)}</div>`;}}
window.refreshAttendanceData=function(){return loadAttendanceData({force:true});};
function rowByDate(date){return attendanceData?.records?.find(r=>r.date===date);}
function showDetail(date){const r=rowByDate(date);if(!r)return;const transport=(r.transportation||[]).map(t=>`${escapeHtml(t.section||'区間未入力')} / ¥${escapeHtml(t.amount||0)}`).join('<br>')||'<span class="muted">なし</span>';const issue=r.issueText?`<div class="detail-row"><div class="detail-label">確認事項</div><div class="detail-value" style="color:#f59e0b">${escapeHtml(r.issueText)}</div></div>`:'';openSheet(`${displayDate(r.date)} 勤怠詳細`,`
  <div class="detail-block">
    <div class="detail-row"><div class="detail-label">対象日</div><div class="detail-value">${escapeHtml(r.date)} / ${escapeHtml(r.weekday)}</div></div>
    <div class="detail-row"><div class="detail-label">勤務予定</div><div class="detail-value">${escapeHtml((r.scheduledStartTime||'--:--')+' - '+(r.scheduledEndTime||'--:--'))}</div></div>
    <div class="detail-row"><div class="detail-label">出勤</div><div class="detail-value">${escapeHtml(r.clockIn||'--:--')}</div></div>
    <div class="detail-row"><div class="detail-label">退勤</div><div class="detail-value">${escapeHtml(r.clockOut||'--:--')}</div></div>
    <div class="detail-row"><div class="detail-label">休憩</div><div class="detail-value">${escapeHtml(r.breakMinutes||'-')}</div></div>
    <div class="detail-row"><div class="detail-label">勤務時間</div><div class="detail-value">${escapeHtml(r.workMinutes||'-')}</div></div>
    <div class="detail-row"><div class="detail-label">勤務場所</div><div class="detail-value">${escapeHtml(r.workLocationName||'-')}</div></div>
    <div class="detail-row"><div class="detail-label">住所メモ</div><div class="detail-value">${escapeHtml(r.addressMemo||'-')}</div></div>
    <div class="detail-row"><div class="detail-label">交通費</div><div class="detail-value">${transport}</div></div>
    ${issue}
  </div>
  <div class="sheet-actions"><button class="submit-btn" onclick="goStampRequest('${escapeHtml(r.date)}','${escapeHtml(r.attendanceId||'')}','${escapeHtml(r.issueType||'')}','${escapeHtml(r.workType||'')}','${escapeHtml(r.workPatternName||'')}')">この日の打刻を修正</button><button class="ghost-btn" onclick="closeSheet()">閉じる</button></div>`);}
window.goStampRequest=function(date,attendanceId,issueType,workType,pattern){const kind=issueType==='out'?'out':'in';const missing=issueType==='out'?'out':issueType==='in'?'in':'';const qs=new URLSearchParams({open:'new',type:'stamp',date,kind,missing,attendanceId,workStyle:String(workType).includes('シフト')?'shift':'fixed',shift:pattern||''});location.href='NEXUS_ONE_Application_v2_mobile_optimized.html?'+qs.toString();}
function monthSheet(){const years=[selectedYear-1,selectedYear,selectedYear+1];const months=Array.from({length:12},(_,i)=>i+1);openSheet('月を選択',`<div class="month-panel"><div class="year-tabs">${years.map(y=>`<button class="year-tab ${y===selectedYear?'active':''}" onclick="selectYear(${y})">${y}</button>`).join('')}</div><div class="month-grid">${months.map(m=>`<button class="month-cell ${m===selectedMonth?'active':''}" onclick="selectMonth(${m})">${m}月</button>`).join('')}</div></div>`);}
window.selectYear=function(y){selectedYear=y;monthSheet();};window.selectMonth=function(m){selectedMonth=m;closeSheet();loadAttendanceData({force:true});};
document.getElementById('monthTopBtn').onclick=monthSheet;document.getElementById('monthValue').onclick=monthSheet;document.getElementById('jumpErrorBtn').onclick=()=>{const row=attendanceData?.firstIssue?document.querySelector(`[data-date="${attendanceData.firstIssue.date}"]`):null;if(row){row.scrollIntoView({behavior:'smooth',block:'center'});row.classList.add('focus');setTimeout(()=>row.classList.remove('focus'),1800);}};

function resolveNavEmployeeId(){
  try{
    const qp = new URLSearchParams(location.search);
    for(const k of ['employeeId','eid']){
      const v = qp.get(k);
      if(v) return v.trim();
    }
    if(typeof CURRENT_EMPLOYEE_ID !== 'undefined' && CURRENT_EMPLOYEE_ID) return String(CURRENT_EMPLOYEE_ID).trim();
    const keys = ['nexusEmployeeId','nexusCurrentEmployeeId','employeeId'];
    for(const k of keys){
      const v = sessionStorage.getItem(k);
      if(v) return v.trim();
    }
    for(const k of keys){
      const v = localStorage.getItem(k);
      if(v) return v.trim();
    }
  }catch(e){}
  return '';
}
function goAppPage(fileName){
  window.location.href = new URL(fileName, location.href).toString();
}

const tabbar=document.getElementById('tabbar');let tabTimer;function showTabbar(){tabbar.classList.add('show');tabbar.classList.remove('hide');clearTimeout(tabTimer);tabTimer=setTimeout(()=>{tabbar.classList.add('hide');tabbar.classList.remove('show');},2600);}['mousemove','touchstart','scroll','keydown'].forEach(ev=>document.addEventListener(ev,showTabbar,{passive:true}));setTimeout(showTabbar,400);
function redirectToAppEntry(){location.href=new URL('index.html',location.href).toString();}
if(!CURRENT_EMPLOYEE_ID){document.getElementById('attendanceList').innerHTML='<div class="empty-state">社員IDを確認しています...</div>';setTimeout(redirectToAppEntry,500);}else{loadAttendanceData();}
</script>
