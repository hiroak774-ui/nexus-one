<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

  <meta name="theme-color" content="#07152c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEXUS ONE">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./nexus-one-icon-soft-180.png">
<title>NEXUS ONE Login Unified v2</title>
<style>
:root{
  --ink:#e5f0ff;
  --muted:#94a3b8;
  --soft:#64748b;
  --blue:#2563eb;
  --cyan:#38bdf8;
  --glass:rgba(15,23,42,.48);
  --panel-border:rgba(148,163,184,.16);
  --danger:#fb7185;
  --success:#34d399;
  --warning:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0}
button,input{font-family:inherit}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  background:
    radial-gradient(circle at 18% 12%,rgba(56,189,248,.18),transparent 28%),
    radial-gradient(circle at 78% 18%,rgba(99,102,241,.18),transparent 34%),
    radial-gradient(circle at 50% 88%,rgba(14,165,233,.12),transparent 34%),
    linear-gradient(155deg,#01040f 0%,#071127 44%,#0b1f49 100%);
  overflow:hidden;
  padding:20px;
}
.phone{
  width:390px;
  max-width:100%;
  height:800px;
  max-height:calc(100vh - 40px);
  min-height:680px;
  border-radius:44px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,rgba(15,23,42,.68),rgba(15,23,42,.36));
  border:1px solid rgba(148,163,184,.20);
  box-shadow:0 34px 90px rgba(0,0,0,.42);
  backdrop-filter:blur(28px);
}
.aurora{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 16%,rgba(56,189,248,.12),transparent 26%),
    radial-gradient(circle at 18% 80%,rgba(37,99,235,.08),transparent 28%),
    radial-gradient(circle at 82% 78%,rgba(14,165,233,.08),transparent 30%);
  filter:blur(14px);
  opacity:.62;
}
#ambientCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  opacity:.42;
  pointer-events:none;
}
.content{
  position:relative;
  z-index:2;
  height:100%;
  padding:68px 28px 30px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.brand{
  margin-top:44px;
  text-align:center;
  animation:focusIn .85s ease both;
}
.logo-wrap{
  position:relative;
  width:224px;
  height:178px;
  margin:0 auto 18px;
  display:grid;
  place-items:center;
}
#logoParticleCanvas{
  position:absolute;
  inset:-10px;
  width:calc(100% + 20px);
  height:calc(100% + 20px);
  opacity:.92;
}
.logo-plate{
  position:relative;
  z-index:2;
  width:206px;
  height:164px;
  border-radius:32px;
  display:grid;
  place-items:center;
  background:transparent;
  border:0;
  box-shadow:none;
  backdrop-filter:blur(10px);
}
.logo-plate::before{
  content:"";
  position:absolute;
  inset:16px 8px;
  border-radius:999px;
  background:radial-gradient(circle,rgba(255,255,255,.26),rgba(255,255,255,.08) 48%,rgba(56,189,248,.00) 72%);
  filter:blur(18px);
  opacity:.72;
  pointer-events:none;
}
.logo-plate img{
  position:relative;
  z-index:1;
  width:182px;
  height:auto;
  display:block;
  filter:drop-shadow(0 14px 24px rgba(15,23,42,.14));
}
h1{
  color:var(--ink);
  font-size:29px;
  line-height:1;
  letter-spacing:.10em;
  font-weight:900;
}
.copy{
  margin-top:8px;
  color:#94a3b8;
  font-size:14px;
  font-weight:700;
  letter-spacing:.03em;
}
.login-card{
  width:100%;
  margin-top:auto;
  margin-bottom:22px;
  padding:20px;
  border-radius:32px;
  background:rgba(15,23,42,.38);
  border:1px solid rgba(148,163,184,.16);
  backdrop-filter:blur(22px);
  box-shadow:0 22px 54px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.06);
  animation:rise .72s ease .08s both;
}
.note{
  text-align:center;
  color:#94a3b8;
  font-size:12px;
  line-height:1.7;
  margin-bottom:16px;
  font-weight:700;
}
.input-group{
  margin-bottom:12px;
}
.input-label{
  display:block;
  color:#cbd5e1;
  font-size:11px;
  font-weight:850;
  letter-spacing:.08em;
  margin:0 0 8px 2px;
}
.email-input{
  width:100%;
  height:54px;
  border:1px solid rgba(148,163,184,.20);
  border-radius:20px;
  background:rgba(255,255,255,.08);
  color:#e5f0ff;
  font-size:15px;
  font-weight:760;
  outline:none;
  padding:0 16px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  transition:border-color .2s ease, background .2s ease, box-shadow .2s ease;
}
.email-input::placeholder{color:rgba(148,163,184,.62)}
.email-input:focus{
  border-color:rgba(56,189,248,.48);
  background:rgba(255,255,255,.11);
  box-shadow:0 0 0 4px rgba(56,189,248,.08), inset 0 1px 0 rgba(255,255,255,.06);
}
.primary{
  height:58px;
  width:100%;
  border:0;
  border-radius:22px;
  background:linear-gradient(135deg,#1e40af,#2563eb 62%,#38bdf8);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:15px;
  font-weight:850;
  color:#fff;
  box-shadow:0 18px 38px rgba(37,99,235,.26);
  cursor:pointer;
  transition:.18s ease;
  position:relative;
  overflow:hidden;
}
.primary:active{transform:translateY(1px) scale(.992)}
.primary[disabled],.google[disabled]{opacity:.62;cursor:default}
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  color:#64748b;
  font-size:10px;
  font-weight:850;
  letter-spacing:.10em;
  margin:14px 0;
}
.divider::before,.divider::after{
  content:"";
  height:1px;
  flex:1;
  background:rgba(148,163,184,.16);
}
.google{
  height:56px;
  width:100%;
  border:1px solid #dadce0;
  border-radius:18px;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  font-size:15px;
  font-weight:700;
  color:#3c4043;
  box-shadow:0 1px 2px rgba(60,64,67,.08),0 8px 18px rgba(15,23,42,.10);
  cursor:pointer;
  transition:background .18s ease,border-color .18s ease,box-shadow .18s ease,transform .18s ease;
}
.google:hover{
  background:#f8fbff;
  border-color:#c9d7f8;
  box-shadow:0 1px 2px rgba(60,64,67,.10),0 10px 22px rgba(15,23,42,.12);
}
.google:active{transform:translateY(1px) scale(.992)}
.g{
  width:20px;
  height:20px;
  display:block;
  flex:0 0 auto;
}
.status{
  min-height:18px;
  margin-top:13px;
  text-align:center;
  color:#94a3b8;
  font-size:11px;
  line-height:1.55;
  font-weight:730;
}
.status.error{color:var(--danger)}
.status.success{color:var(--success)}
.status.warning{color:var(--warning)}
.footer{
  position:absolute;
  bottom:22px;
  left:0;
  right:0;
  text-align:center;
  color:#64748b;
  font-size:11px;
  z-index:2;
}
.loading-dot{
  width:6px;
  height:6px;
  border-radius:999px;
  background:rgba(255,255,255,.92);
  box-shadow:0 0 16px rgba(125,211,252,.8);
  animation:sending 1.1s ease-in-out infinite;
}
@keyframes sending{
  0%,100%{opacity:.42;transform:scale(.82)}
  50%{opacity:1;transform:scale(1.14)}
}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes focusIn{
  from{opacity:0;filter:blur(10px);transform:translateY(10px) scale(.98)}
  to{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}
}
@media(max-height:735px){
  .content{padding-top:44px}
  .brand{margin-top:18px}
  .logo-wrap{width:190px;height:150px;margin-bottom:12px}
  .logo-plate{width:176px;height:142px;border-radius:28px}
  .logo-plate img{width:154px}
  h1{font-size:26px}
  .copy{margin-top:12px}
  .login-card{margin-bottom:20px}
}

/* =========================================================
   NEXUS ONE production mobile viewport fix
   - Removes desktop phone mock frame on real smartphones
   - Uses dynamic viewport height for Safari / LINE in-app browser
   ========================================================= */
@media (max-width: 640px), (hover: none) and (pointer: coarse) {
  html,
  body {
    width: 100%;
    min-height: 100%;
  }

  body {
    display: block !important;
    place-items: unset !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: hidden !important;
  }

  .phone {
    width: 100vw !important;
    max-width: none !important;
    height: 100svh !important;
    height: 100dvh !important;
    min-height: 0 !important;
    max-height: none !important;
    border-radius: 0 !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  .app {
    height: 100% !important;
    min-height: 100% !important;
    padding-top: calc(16px + env(safe-area-inset-top)) !important;
    padding-right: max(16px, env(safe-area-inset-right)) !important;
    padding-bottom: calc(14px + env(safe-area-inset-bottom)) !important;
    padding-left: max(16px, env(safe-area-inset-left)) !important;
  }

  .header {
    margin-bottom: 14px !important;
  }

  .content,
  .screen-content,
  .page-content,
  .scroll-area {
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(104px + env(safe-area-inset-bottom)) !important;
  }

  .tabbar,
  .bottom-nav,
  .nav-bar {
    left: max(14px, env(safe-area-inset-left)) !important;
    right: max(14px, env(safe-area-inset-right)) !important;
    bottom: calc(12px + env(safe-area-inset-bottom)) !important;
    width: auto !important;
    height: 68px !important;
    border-radius: 26px !important;
  }

  .sheet,
  .notify,
  .bottom-sheet,
  .modal-sheet {
    left: max(12px, env(safe-area-inset-left)) !important;
    right: max(12px, env(safe-area-inset-right)) !important;
    bottom: calc(12px + env(safe-area-inset-bottom)) !important;
    max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }
}

@media (max-width: 640px) and (max-height: 760px) {
  .header { margin-bottom: 10px !important; }
  .user { margin-top: 2px !important; }
  .date { margin-top: 6px !important; }
  .clock-wrap { margin-top: 14px !important; }
  .hm { font-size: clamp(58px, 18vw, 76px) !important; }
  .sec { font-size: clamp(18px, 5vw, 24px) !important; }
  .assist { margin-top: 10px !important; }
  .panel { margin-top: 16px !important; padding: 14px !important; }
  .punch-btn { height: 76px !important; }
  .quick { margin-top: 12px !important; }
  .stat { padding: 12px !important; }
}

/* Login screen vertical balance adjustment */
@media (max-width: 640px), (hover: none) and (pointer: coarse) {
  .content {
    padding-bottom: calc(28px + env(safe-area-inset-bottom)) !important;
  }
  .login-card {
    margin-bottom: 20px !important;
  }
}

@media (max-width: 640px) and (max-height: 760px) {
  .content {
    padding-top: calc(48px + env(safe-area-inset-top)) !important;
    padding-bottom: calc(22px + env(safe-area-inset-bottom)) !important;
  }
  .brand { margin-top: 18px !important; }
  .login-card { margin-bottom: 16px !important; }
}

</style>

<script>
const GAS_API_URL = localStorage.getItem('nexusGasApiUrl') || 'https://script.google.com/macros/s/AKfycbwiV9vLacv8se1UVdGhhKuoWkSlsNReRJOUIgT494XUMBNUKBOxMhkzXLsvHRdCfWIt/exec';
const APP_ENTRY_URL = 'NEXUS_ONE_App_Entry_v6_mobile_optimized.html';
const HOME_URL = 'NEXUS_ONE_Home_v6_mobile_optimized.html';
const INITIAL_SETUP_URL = 'NEXUS_ONE_Initial_Setup_Unified_v3_mobile_optimized.html';
const STORAGE_KEYS = ['nexusEmployeeId','nexusCurrentEmployeeId','employeeId'];
const EMAIL_KEYS = ['nexusUserEmail','nexusLoginEmail'];

const params = new URLSearchParams(location.search);
const emailInput = document.getElementById('emailInput');
const loginBtn = document.getElementById('loginBtn');
const googleBtn = document.getElementById('googleBtn');
const loginLabel = document.getElementById('loginLabel');
const statusText = document.getElementById('statusText');

function getStoredEmployeeId(){
  const fromUrl = params.get('employeeId') || params.get('eid') || '';
  if(fromUrl) return fromUrl.trim();
  for(const key of STORAGE_KEYS){
    const value = sessionStorage.getItem(key) || localStorage.getItem(key);
    if(value) return value.trim();
  }
  return '';
}

function setStatus(message, type=''){
  statusText.textContent = message || '';
  statusText.className = 'status' + (type ? ' ' + type : '');
}

function setBusy(isBusy){
  loginBtn.disabled = isBusy;
  googleBtn.disabled = isBusy;
  loginLabel.innerHTML = isBusy ? '<span class="loading-dot"></span> 確認中' : 'メールアドレスで確認';
}

function clearSavedUser(){
  [...STORAGE_KEYS, ...EMAIL_KEYS].forEach(key => {
    localStorage.removeItem(key);
    sessionStorage.removeItem(key);
  });
}

function saveUser(employeeId, email){
  if(employeeId){
    STORAGE_KEYS.forEach(key => {
      localStorage.setItem(key, employeeId);
      sessionStorage.setItem(key, employeeId);
    });
  }
  if(email){
    EMAIL_KEYS.forEach(key => {
      localStorage.setItem(key, email);
      sessionStorage.setItem(key, email);
    });
  }
}

function normalizeStatus(data){
  const root = data && (data.data || data.result || data.user || data.employee || data);
  const employee = (data && (data.employee || data.user)) || root || {};
  const employeeId = data?.employeeId || root?.employeeId || root?.['社員ID'] || employee?.employeeId || employee?.['社員ID'] || '';
  const email = data?.email || root?.email || root?.mail || root?.['Googleメールアドレス'] || employee?.email || employee?.['Googleメールアドレス'] || emailInput.value.trim();
  const registrationStatus = data?.registrationStatus || root?.registrationStatus || root?.['登録ステータス'] || employee?.registrationStatus || employee?.['登録ステータス'] || '';
  const accountStatus = data?.accountStatus || root?.accountStatus || root?.['アカウント状態'] || employee?.accountStatus || employee?.['アカウント状態'] || '';
  const status = String(data?.status || root?.status || data?.userStatus || root?.userStatus || '').toLowerCase();
  const approved = data?.approved === true || root?.approved === true || registrationStatus === '承認済' || ['approved','active','ok'].includes(status);
  const pending = data?.pending === true || root?.pending === true || registrationStatus === '承認待ち' || registrationStatus === '申請中' || ['pending','waiting','approval_pending'].includes(status);
  const unregistered = data?.registered === false || root?.registered === false || data?.exists === false || root?.exists === false || ['unregistered','not_found','notfound','none'].includes(status);
  const disabled = data?.active === false || root?.active === false || accountStatus === '無効' || ['disabled','inactive','suspended'].includes(status);
  const ok = data?.ok !== false && data?.success !== false;
  return { ok, employeeId, email, registrationStatus, accountStatus, approved, pending, unregistered, disabled, raw:data };
}

async function requestByFetch(payload){
  const url = new URL(GAS_API_URL);
  Object.entries(payload).forEach(([key,value]) => {
    if(value !== undefined && value !== null && value !== '') url.searchParams.set(key, value);
  });
  const res = await fetch(url.toString(), { method:'GET', mode:'cors', cache:'no-store' });
  if(!res.ok) throw new Error('network');
  return await res.json();
}

function requestByJsonp(payload){
  return new Promise((resolve,reject) => {
    const callbackName = 'nexusLoginCallback_' + Date.now() + '_' + Math.random().toString(16).slice(2);
    const url = new URL(GAS_API_URL);
    Object.entries(payload).forEach(([key,value]) => {
      if(value !== undefined && value !== null && value !== '') url.searchParams.set(key, value);
    });
    url.searchParams.set('callback', callbackName);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);
    function cleanup(){
      clearTimeout(timer);
      delete window[callbackName];
      script.remove();
    }
    window[callbackName] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('jsonp')); };
    script.src = url.toString();
    document.body.appendChild(script);
  });
}

async function callCheckUserStatus({ email='', employeeId='' }){
  if(GAS_API_URL.includes('PASTE_NEW_GAS_DEPLOYMENT_ID_HERE')){
    throw new Error('gas-url-not-set');
  }
  const payload = { action:'checkUserStatus', email, employeeId };
  try{
    return await requestByFetch(payload);
  }catch(err){
    return await requestByJsonp(payload);
  }
}

function transitionTo(url){
  document.querySelector('.phone').style.transition = 'opacity .42s ease, filter .42s ease, transform .42s ease';
  document.querySelector('.phone').style.opacity = '0';
  document.querySelector('.phone').style.filter = 'blur(10px) brightness(1.14)';
  document.querySelector('.phone').style.transform = 'translateY(-4px) scale(.992)';
  setTimeout(() => { location.href = url; }, 420);
}

function resolveApprovedDestination(employeeId){
  const direct = params.get('redirect');
  if(direct === 'home') return `${HOME_URL}?employeeId=${encodeURIComponent(employeeId)}`;
  return `${APP_ENTRY_URL}?employeeId=${encodeURIComponent(employeeId)}`;
}

async function handleLogin(source='email'){
  const email = emailInput.value.trim();
  const employeeId = getStoredEmployeeId();
  if(!email && !employeeId){
    setStatus('メールアドレスを入力してください。', 'warning');
    emailInput.focus();
    return;
  }
  setBusy(true);
  setStatus(source === 'google' ? 'Googleログイン情報を確認しています。' : '登録状況を確認しています。');
  try{
    const data = await callCheckUserStatus({ email, employeeId });
    const user = normalizeStatus(data);
    if(!user.ok) throw new Error('api');
    if(user.disabled){
      clearSavedUser();
      setStatus('このアカウントは無効です。管理者へ確認してください。', 'error');
      return;
    }
    if(user.approved && user.employeeId){
      saveUser(user.employeeId, user.email || email);
      setStatus('認証しました。NEXUS ONEを起動します。', 'success');
      transitionTo(resolveApprovedDestination(user.employeeId));
      return;
    }
    if(user.pending){
      if(user.employeeId || email) saveUser(user.employeeId, user.email || email);
      setStatus('承認待ちです。申請状況画面へ移動します。', 'warning');
      const query = new URLSearchParams();
      if(user.employeeId) query.set('employeeId', user.employeeId);
      if(user.email || email) query.set('email', user.email || email);
      query.set('status', 'pending');
      transitionTo(`${INITIAL_SETUP_URL}?${query.toString()}`);
      return;
    }
    if(user.unregistered || !user.employeeId){
      setStatus('未登録のため、初回登録へ移動します。', 'warning');
      const query = new URLSearchParams();
      if(user.email || email) query.set('email', user.email || email);
      transitionTo(`${INITIAL_SETUP_URL}${query.toString() ? '?' + query.toString() : ''}`);
      return;
    }
    setStatus('ログイン状態を確認できませんでした。管理者へ確認してください。', 'error');
  }catch(err){
    if(err.message === 'gas-url-not-set'){
      setStatus('GAS API URLが未設定です。デプロイURLを設定してください。', 'error');
    }else{
      setStatus('接続に失敗しました。時間をおいて再度お試しください。', 'error');
    }
  }finally{
    setBusy(false);
  }
}

loginBtn.addEventListener('click', () => handleLogin('email'));
emailInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') handleLogin('email');
});
googleBtn.addEventListener('click', () => {
  setStatus('本番ではGoogle認証後のメールで確認します。現在はメール入力で確認してください。');
  if(emailInput.value.trim()) handleLogin('google');
  else emailInput.focus();
});
(function init(){
  if(params.get('clear') === '1'){
    clearSavedUser();
    setStatus('保存済みの社員IDをクリアしました。', 'success');
  }
  const email = params.get('email') || localStorage.getItem('nexusUserEmail') || localStorage.getItem('nexusLoginEmail') || '';
  if(email) emailInput.value = email;
  const employeeIdFromUrl = params.get('employeeId') || params.get('eid');
  if(employeeIdFromUrl){
    setStatus('社員IDから再認証します。');
    setTimeout(() => handleLogin('employeeId'), 450);
  }
})();
</script>

<script>
function setupParticles(canvas, count, opacityBoost=0){
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width*dpr);
    canvas.height = Math.floor(rect.height*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    particles = Array.from({length:count},()=>({
      x:Math.random()*rect.width,
      y:Math.random()*rect.height,
      r:Math.random()*1.6+.45,
      vx:(Math.random()-.5)*.045,
      vy:(Math.random()-.5)*.045,
      a:Math.random()*.34+.12+opacityBoost,
      p:Math.random()*Math.PI*2
    }));
  }
  function draw(){
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    particles.forEach(pt=>{
      pt.x += pt.vx; pt.y += pt.vy; pt.p += .007;
      if(pt.x<-8)pt.x=rect.width+8;if(pt.x>rect.width+8)pt.x=-8;
      if(pt.y<-8)pt.y=rect.height+8;if(pt.y>rect.height+8)pt.y=-8;
      const alpha = Math.max(.05,pt.a + Math.sin(pt.p)*.08);
      ctx.beginPath();
      ctx.fillStyle = `rgba(125,211,252,${alpha})`;
      ctx.shadowBlur = 22;
      ctx.shadowColor = 'rgba(56,189,248,.58)';
      ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); draw();
  window.addEventListener('resize',resize);
}
setupParticles(document.getElementById('ambientCanvas'),92);
setupParticles(document.getElementById('logoParticleCanvas'),26,.12);
</script>
